<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Kontaktirajte me</h1>
        <nav>
            <a href="index.html">Početna</a>
            <a href="tema.html">Akademska tema</a>
            <a href="kontakt.html">Kontakt</a>
        </nav>
    </header>

    <main>
        <section class="form-container">
            <form action="#" method="post">
                <label for="ime">Ime i prezime:</label><br>
                <input type="text" id="ime" name="ime" placeholder="Vaše ime.." required><br><br>

                <label for="poruka">Vaša poruka:</label><br>
                <textarea id="poruka" name="poruka" rows="5" required></textarea><br><br>

                <button type="submit" class="btn-submit">Pošalji</button>
            </form>
        </section>
    </main>
</body>
</html>
